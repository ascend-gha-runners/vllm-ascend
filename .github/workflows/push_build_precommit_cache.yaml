# This workflow populates the pre-commit cache in OBS on push to main.
# Fork PRs can then restore this cache read-only without needing OIDC credentials.
name: 'Cache pre-commit'
on:
  push:
    branches: ["main"]
    paths:
      - '.pre-commit-config.yaml'
      - 'requirements-lint.txt'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: precommit-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cache:
    runs-on: linux-amd64-cpu-test-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if cache exists
        id: check-cache
        env:
          HW_OBS_AK: ${{ secrets.HW_OBS_AK }}
          HW_OBS_SK: ${{ secrets.HW_OBS_SK }}
        run: |
          # Install obsutil if not present
          if ! command -v obsutil &>/dev/null; then
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) OBSUTIL_ARCH="amd64" ;;
              aarch64|arm64) OBSUTIL_ARCH="arm64" ;;
            esac
            curl -sSL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${OBSUTIL_ARCH}.tar.gz" -o /tmp/obsutil.tar.gz
            tar -xzf /tmp/obsutil.tar.gz -C /tmp
            OBSUTIL_DIR=$(find /tmp -maxdepth 1 -name "obsutil_linux_${OBSUTIL_ARCH}_*" -type d | head -1)
            chmod +x "${OBSUTIL_DIR}/obsutil"
            export PATH="${OBSUTIL_DIR}:${PATH}"
            echo "${OBSUTIL_DIR}" >> $GITHUB_PATH
          fi
          obsutil config -i="${HW_OBS_AK}" -k="${HW_OBS_SK}" -e=obs.ap-southeast-1.myhuaweicloud.com
          CACHE_KEY="pre-commit-$(sha256sum .pre-commit-config.yaml | awk '{print $1}')"
          if obsutil ls "obs://ascend-ci-cache-hk/precommit-cache/${CACHE_KEY}" --limit=1 2>/dev/null | grep -q "${CACHE_KEY}"; then
            echo "cache-hit=true" >> $GITHUB_OUTPUT
            echo "Cache already exists, skipping rebuild"
          else
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            echo "Cache not found, will rebuild"
          fi

      - name: Install pre-commit
        if: steps.check-cache.outputs.cache-hit != 'true'
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pip install pre-commit

      - name: Clean stale pre-commit cache
        if: steps.check-cache.outputs.cache-hit != 'true'
        run: rm -rf ~/.cache/pre-commit

      - name: Run pre-commit (populate cache)
        if: steps.check-cache.outputs.cache-hit != 'true'
        env:
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pre-commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Save pre-commit cache
        if: always() && steps.check-cache.outputs.cache-hit != 'true'
        env:
          HW_OBS_AK: ${{ secrets.HW_OBS_AK }}
          HW_OBS_SK: ${{ secrets.HW_OBS_SK }}
        run: |
          if ! command -v obsutil &>/dev/null; then
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) OBSUTIL_ARCH="amd64" ;;
              aarch64|arm64) OBSUTIL_ARCH="arm64" ;;
            esac
            curl -sSL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${OBSUTIL_ARCH}.tar.gz" -o /tmp/obsutil.tar.gz
            tar -xzf /tmp/obsutil.tar.gz -C /tmp
            OBSUTIL_DIR=$(find /tmp -maxdepth 1 -name "obsutil_linux_${OBSUTIL_ARCH}_*" -type d | head -1)
            chmod +x "${OBSUTIL_DIR}/obsutil"
            export PATH="${OBSUTIL_DIR}:${PATH}"
          fi
          obsutil config -i="${HW_OBS_AK}" -k="${HW_OBS_SK}" -e=obs.ap-southeast-1.myhuaweicloud.com
          ARCHIVE_DIR=$(mktemp -d)
          ARCHIVE_PATH="${ARCHIVE_DIR}/cache.tgz"
          tar -czf "${ARCHIVE_PATH}" -C ~ .cache/pre-commit
          CACHE_KEY="pre-commit-$(sha256sum .pre-commit-config.yaml | awk '{print $1}')"
          obsutil cp "${ARCHIVE_PATH}" "obs://ascend-ci-cache-hk/precommit-cache/${CACHE_KEY}" -f
          echo "Cache saved to obs://ascend-ci-cache-hk/precommit-cache/${CACHE_KEY}"

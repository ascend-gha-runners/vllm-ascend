name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    if: ${{ github.event.action != 'labeled' || github.event.label.name == 'ready' }}
    runs-on: ubuntu-latest
    outputs:
      main_commit: ${{ steps.vllm.outputs.main_commit }}
      release_tag: ${{ steps.vllm.outputs.release_tag }}
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read verified vLLM refs
        id: vllm
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

  run-selected-tests:
    needs: setup
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ready') }}
    strategy:
      fail-fast: false
      matrix:
        vllm_version:
          - ${{ needs.setup.outputs.main_commit }}
          - ${{ needs.setup.outputs.release_tag }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ github.event.pull_request.head.sha }}
      test_groups: '[{"num_npus":2,"npu_type":"a3","runner":"linux-aarch64-a3-test-2","tests":"tests/e2e/pull_request/two_card","partition":"1-1","image_tag":"9.0.0-a3-ubuntu22.04-py3.12"},{"num_npus":4,"npu_type":"a3","runner":"linux-aarch64-a3-test-4","tests":"tests/e2e/pull_request/four_card/test_data_parallel_tp2.py tests/e2e/pull_request/four_card/test_deepseek_v3_2_w8a8_pruning.py tests/e2e/pull_request/four_card/test_deepseek_v4.py tests/e2e/pull_request/four_card/test_pipeline_parallel.py tests/e2e/pull_request/four_card/test_profiling_chunk_performance.py tests/e2e/pull_request/four_card/test_qwen3_5.py tests/e2e/pull_request/four_card/test_qwen3_next.py tests/e2e/pull_request/four_card/long_sequence tests/e2e/pull_request/four_card/spec_decode","partition":"1-1","image_tag":"9.0.0-a3-ubuntu22.04-py3.12"}]'

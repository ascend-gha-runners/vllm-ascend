name: E2E

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-select-tests:
    if: ${{ github.event.action != 'labeled' || github.event.label.name == 'ready' }}
    runs-on: linux-amd64-cpu-test-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    outputs:
      has_tests: ${{ steps.scope.outputs.has_tests || steps.noop.outputs.has_tests }}
      test_groups: ${{ steps.scope.outputs.test_groups || steps.noop.outputs.test_groups }}
      matched_modules: ${{ steps.scope.outputs.matched_modules || steps.noop.outputs.matched_modules }}
      main_commit: ${{ steps.vllm.outputs.main_commit }}
      release_tag: ${{ steps.vllm.outputs.release_tag }}
    steps:

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read verified vLLM refs
        id: vllm
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: cp problem matchers
        run: |
          cp .github/workflows/matchers/actionlint.json "$RUNNER_TEMP/actionlint.json"
          cp .github/workflows/matchers/markdownlint.json "$RUNNER_TEMP/markdownlint.json"
          cp .github/workflows/matchers/mypy.json "$RUNNER_TEMP/mypy.json"

      - run: echo "::add-matcher::$RUNNER_TEMP/actionlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/markdownlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/mypy.json"

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v7
        with:
          repository: vllm-project/vllm
          path: ./vllm-empty
          ref: ${{ steps.vllm.outputs.main_commit }}

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            lint_tracker:
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'requirements-lint.txt'
            src:
              - 'vllm_ascend/**'
              - 'setup.py'
              - 'csrc/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'cmake/**'
              - '.github/**'
              - 'tests/**'
              - 'tools/**'
              - 'CMakeLists.txt'

      - name: Install vllm-ascend dev (conditional)
        if: steps.filter.outputs.lint_tracker == 'true'
        env:
          UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
          UV_INDEX_STRATEGY: unsafe-best-match
          UV_NO_CACHE: 1
          UV_SYSTEM_PYTHON: 1
        run: |
          pip install uv
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pip install uc-manager
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run pre-commit
        env:
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          # pre-commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Run mypy
        run: |
          PYTHONPATH="$PYTHONPATH:$(pwd)/vllm-empty"
          export PYTHONPATH
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          for python_version in "3.10" "3.11" "3.12"; do
            echo "============================"
            tools/mypy.sh 1 "$python_version"
            echo "============================"
          done

      - name: Validate test coverage config
        run: |
          pip install pyyaml
          python3 .github/workflows/scripts/coverage.py

      - name: Select tests based on changed files
        id: scope
        if: steps.filter.outputs.src == 'true'
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          git fetch origin ${{ github.base_ref }}
          pip install regex
          python3 .github/workflows/scripts/select_tests.py \
            --diff-base origin/${{ github.base_ref }}

      - name: Validate inputs (workflow_dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          tag="${{ inputs.workflow_dispatch_tag }}"
          branch="${{ inputs.branch_ref }}"
          if [[ -n "$tag" && -n "$branch" ]]; then
            echo "Error: 'tag' and 'branch' are mutually exclusive. Please specify only one."
            exit 1
          fi
          if [[ -z "$tag" && -z "$branch" ]]; then
            echo "Error: Either 'tag' or 'branch' must be specified."
            exit 1
          fi

      - uses: actions/checkout@v6
        if: ${{ github.event_name != 'workflow_dispatch' }}
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.branch_ref }}

      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag != '' }}
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.workflow_dispatch_tag }}

      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag == '' }}
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.branch_ref }}

      - name: Prepare suffix
        run: |
          if [ -n "${{ inputs.suffix }}" ]; then
            echo "SUFFIX=-${{ inputs.suffix }}-${{ matrix.tag }}" >> $GITHUB_ENV
          else
            echo "SUFFIX=-${{ matrix.tag }}" >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.QUAY_REPO }}
          tags: |
            type=pep440,pattern={{raw}},suffix=${{ env.SUFFIX }}
            type=schedule,pattern=${{ inputs.schedule_tag_pattern }},prefix=nightly-,suffix=${{ env.SUFFIX }}
            type=raw,value=${{ inputs.workflow_dispatch_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag != '' }},suffix=${{ env.SUFFIX }}
            type=raw,value=${{ inputs.branch_ref }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag == '' }},prefix=nightly-,suffix=${{ env.SUFFIX }}
          flavor:
            latest=false

      - name: Prepare docker config
        if: ${{ inputs.should_push }}
        run: |
          mkdir -p /tmp/bk
          QUAY_AUTH=$(printf "%s:%s" "${QUAY_TEMP_USERNAME}" "${QUAY_TEMP_PASSWORD}" | base64 -w0)
          cat > /tmp/bk/config.json <<EOF
          {
            "auths": {
              "quay.io": { "auth": "${QUAY_AUTH}" }
            }
          }
          EOF

      # - name: Debug env
      #   run: |
      #     echo "BUILDKITD_ADDR=${BUILDKITD_ADDR:-<not set>}"
      #     echo "CA_PEM=${CA_PEM:-<not set>}"
      #     echo "CERT_PEM=${CERT_PEM:-<not set>}"
      #     echo "KEY_PEM=${KEY_PEM:-<not set>}"
      #     echo "DOCKER_CONFIG=${DOCKER_CONFIG:-<not set>}"
      #     echo "--- relevant env vars ---"
      #     env | grep -iE 'build|docker|cert|tls|key|quay' || true
      - name: Prepare TLS certs
        env:
          CA_PEM: ${{ secrets.CA_PEM }}
          CERT_PEM: ${{ secrets.CERT_PEM }}
          KEY_PEM: ${{ secrets.KEY_PEM }}
        run: |
          mkdir -p /tmp/bk/tls
          umask 077
          printf '%s\n' "$CA_PEM"   | tr -d '\r' > /tmp/bk/tls/ca.pem
          printf '%s\n' "$CERT_PEM" | tr -d '\r' > /tmp/bk/tls/cert.pem
          printf '%s\n' "$KEY_PEM"  | tr -d '\r' > /tmp/bk/tls/key.pem
          
          echo "=== File sizes ==="
          echo "ca.pem:   $(wc -c < /tmp/bk/tls/ca.pem) bytes"
          echo "cert.pem: $(wc -c < /tmp/bk/tls/cert.pem) bytes"
          echo "key.pem:  $(wc -c < /tmp/bk/tls/key.pem) bytes"
          
          echo "=== First line of each file ==="
          head -1 /tmp/bk/tls/ca.pem   | cut -c1-20
          head -1 /tmp/bk/tls/cert.pem | cut -c1-20
          head -1 /tmp/bk/tls/key.pem  | cut -c1-20
          
          echo "=== Cert info (subject/issuer/dates) ==="
          openssl x509 -in /tmp/bk/tls/cert.pem -noout -subject -issuer -dates
          
          echo "=== Cert vs Key modulus match ==="
          CERT_MOD=$(openssl x509 -in /tmp/bk/tls/cert.pem -noout -modulus | md5sum)
          KEY_MOD=$(openssl rsa -in /tmp/bk/tls/key.pem -noout -modulus 2>/dev/null | md5sum)
          echo "cert modulus: $CERT_MOD"
          echo "key  modulus: $KEY_MOD"
          if [ "$CERT_MOD" = "$KEY_MOD" ]; then
            echo "RESULT: MATCH"
          else
            echo "RESULT: MISMATCH"
          fi
          
          echo "=== Verify cert against CA ==="
          openssl verify -CAfile /tmp/bk/tls/ca.pem /tmp/bk/tls/cert.pem || true

      - name: Build and push
        id: build
        run: |
          echo "Installing buildctl..." 
          mkdir -p /tmp/buildkit 
          BUILDKIT_VERSION="v0.29.0" 
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') 
          curl -fsSL "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-${ARCH}.tar.gz" -o /tmp/buildkit.tar.gz
          tar -xzf /tmp/buildkit.tar.gz -C /tmp/buildkit 
          export PATH=$PATH:/tmp/buildkit/bin/
          
          chmod +x /tmp/buildkit/bin/buildctl 
          
          echo "buildctl installed successfully" buildctl --version
          set -ex
          which buildctl
          sleep 600
          DOCKERFILE="${{ inputs.dockerfile || 'Dockerfile' }}"
          DOCKERFILE_DIR=$(dirname "$DOCKERFILE")
          DOCKERFILE_NAME=$(basename "$DOCKERFILE")
          
          ARGS=(
          --addr="tcp://buildkitd-service.buildkitd:1234"
          --tlscacert=/tmp/bk/tls/ca.pem
          --tlscert=/tmp/bk/tls/cert.pem
          --tlskey=/tmp/bk/tls/key.pem

          build
          --frontend dockerfile.v0
          --local context=.
          --local dockerfile="$DOCKERFILE_DIR"
          --opt filename="$DOCKERFILE_NAME"
          --opt platform=${{ matrix.arch }}
          --opt build-arg:PIP_INDEX_URL=https://pypi.org/simple
          --progress=plain
          )
          
          
          if [ "${{ inputs.should_push }}" = "true" ]; then
          ARGS+=(--secret id=dockerconfig,src=/tmp/bk/config.json)

          OUTPUT="type=image,"
          IFS=$'\n'
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
           [ -z "$tag" ] && continue
           OUTPUT="${OUTPUT}name=${tag},"
          done
          unset IFS
          OUTPUT="${OUTPUT%,},push=true"
          ARGS+=(--output "$OUTPUT")
          fi
          
          
          buildctl "${ARGS[@]}"

      - name: Set no-tests output when source paths unchanged
        id: noop
        if: steps.filter.outputs.src != 'true'
        run: |
          {
            echo "has_tests=false"
            echo "test_groups=[]"
            echo "matched_modules="
          } >> "$GITHUB_OUTPUT"

  run-selected-tests:
    needs: lint-and-select-tests
    if: ${{ needs.lint-and-select-tests.outputs.has_tests == 'true' || contains(github.event.pull_request.labels.*.name, 'ready') }}
    strategy:
      matrix:
        vllm_version:
          - ${{ needs.lint-and-select-tests.outputs.main_commit }}
          - ${{ needs.lint-and-select-tests.outputs.release_tag }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.base_ref }}
      test_groups: ${{ needs.lint-and-select-tests.outputs.test_groups }}

name: test-case-007-env-ca

on:
  workflow_dispatch:
  # TEMPORARY: push trigger for pre-merge verification on this branch only.
  # workflow_dispatch requires the file to already exist on the default branch,
  # so this is the standard way to test-run a brand new workflow before merging.
  # Remove this `push:` block before merging to main.
  push:
    branches: [test/env-ca-case-007]

jobs:
  env-ca-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            image: swr.cn-southwest-2.myhuaweicloud.com/modelfoundry/ubuntu:24.04
            os: ubuntu
          - name: openeuler-24.03
            image: swr.cn-southwest-2.myhuaweicloud.com/modelfoundry/openeuler/openeuler:24.03
            os: openeuler
    runs-on: linux-aarch64-cpu-2-buildkit-gy006
    container:
      image: ${{ matrix.image }}
    steps:
      # 这个 workflow 不需要签出仓库代码——唯一用到的文件是下面这个检测脚本，
      # 直接内嵌在 workflow 里，省掉 actions/checkout（连带省掉它需要的
      # git 二进制 + CA 信任这一整套引导逻辑，两个镜像都是裸镜像，没必要
      # 为了"签出自己"这件事单独解决一次信任问题）。
      - name: Write check helper script
        run: |
          mkdir -p /tmp/env-ca-case-007
          cat > /tmp/env-ca-case-007/check_all.sh <<'SCRIPT_EOF'
          #!/bin/sh
          # 跑 5 种客户端的信任检测 + 1 次金丝雀检测，把结果打印成 KEY=VALUE
          # （每行一个），不对任何结果做期望值判断——期望值判断放在下面每个
          # case 步骤旁边，一眼就能看到"这个 case 设置了哪个变量、期望哪个
          # 客户端成功"，不用跳到另一个文件里找 case 分支。
          set -u
          SQUID_CA="${SQUID_CA:-/etc/squid-ca/squid-ca.pem}"
          # pypi.org 直连国内到 squid 这段链路观测到过限速/偶发超时,噪音大,
          # 干扰的是"信任机制生不生效"这个信号本身。换成清华 pypi 镜像
          # (repo 里 Dockerfile/Dockerfile.openEuler 已经在用的同一个源),
          # 域名不在 squid 的 splice 白名单里,一样会被 ssl_bump 拦截,
          # 金丝雀检测逻辑不受影响。
          TARGET_URL="${TARGET_URL:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/}"
          GIT_TARGET="${GIT_TARGET:-https://github.com/octocat/Hello-World}"
          WORKDIR="$(mktemp -d /tmp/env-ca-check.XXXXXX)"

          PIP_EXTRA_FLAGS=""
          if python3 -m pip install --help 2>/dev/null | grep -q "break-system-packages"; then
            PIP_EXTRA_FLAGS="--break-system-packages"
          fi

          issuer=$(curl -s --max-time 10 --cacert "$SQUID_CA" -v -o /dev/null "$TARGET_URL" 2>&1 | grep -i "issuer:")
          case "$issuer" in
            *SquidCacheCA*) echo "CANARY=BUMPED" ;;
            *) echo "CANARY=NOT_BUMPED ($issuer)" ;;
          esac

          if curl -fsS --max-time 30 -o /dev/null "$TARGET_URL" 2>"$WORKDIR/curl.err"; then
            echo "CURL=OK"
          else
            echo "CURL=FAIL"
            echo "CURL_DEBUG: $(tr '\n' ' ' < "$WORKDIR/curl.err")"
          fi

          tries=0
          R_GIT=FAIL
          while [ "$tries" -lt 3 ]; do
            rm -rf "$WORKDIR/git-clone"
            if git clone --depth 1 "$GIT_TARGET" "$WORKDIR/git-clone" >"$WORKDIR/git.log" 2>&1; then
              R_GIT=OK
              break
            fi
            grep -qi "ssl\|certificate" "$WORKDIR/git.log" && break
            tries=$((tries + 1))
            sleep 3
          done
          echo "GIT=$R_GIT"

          if python3 -c "import urllib.request; urllib.request.urlopen('${TARGET_URL}', timeout=10)" >"$WORKDIR/urllib.log" 2>&1; then
            echo "PYTHON_URLLIB=OK"
          else
            echo "PYTHON_URLLIB=FAIL"
          fi

          # 显式指向跟金丝雀/curl/requests 同一个域名的镜像索引,不用 pip 默认的
          # pypi.org——否则这一项测的信任目标跟其他 4 项不是同一个域名,
          # 金丝雀检测"squid 拦了没"这件事就对不上号了。
          # 注意：不能加 --no-deps——第一次真正安装 requests 时如果不带依赖,
          # urllib3 装不上,后面 REQUESTS 检测直接 ModuleNotFoundError,
          # 跟信任机制毫无关系,会把结果搞乱（这里踩过坑,已确认）。
          out=$(python3 -m pip install --no-cache-dir --force-reinstall --index-url "$TARGET_URL" $PIP_EXTRA_FLAGS requests 2>&1)
          echo "$out" >"$WORKDIR/pip.log"
          # 一律打印最后几行,不只在 FAIL 分支打印——上一轮出现过一次无法解释的
          # PIP=OK,需要看到 pip 的原始输出才能确认它是不是真的走了网络,
          # 而不是猜。
          echo "PIP_TRANSCRIPT_TAIL: $(echo "$out" | tail -5 | tr '\n' ' ')"
          if echo "$out" | grep -qE "Collecting|Downloading" && echo "$out" | grep -q "Successfully installed"; then
            echo "PIP=OK"
          else
            echo "PIP=FAIL"
            echo "PIP_DEBUG: $(echo "$out" | tail -5 | tr '\n' ' ')"
          fi

          if python3 -c "import requests; requests.get('${TARGET_URL}', timeout=10)" >"$WORKDIR/requests.log" 2>&1; then
            echo "REQUESTS=OK"
          else
            echo "REQUESTS=FAIL"
            echo "REQUESTS_DEBUG: $(tail -3 "$WORKDIR/requests.log" | tr '\n' ' ')"
          fi

          rm -rf "$WORKDIR"
          SCRIPT_EOF
          chmod +x /tmp/env-ca-case-007/check_all.sh

      - name: Check squid CA is mounted
        run: |
          if [ ! -f /etc/squid-ca/squid-ca.pem ]; then
            echo "::error::/etc/squid-ca/squid-ca.pem not found on this runner" >&2
            exit 1
          fi
          echo "squid CA present."

      # 装测试要用的工具本身（git/curl/python/pip）。这一步跟每个 case 要验证
      # 的信任机制无关——case 00 测的是"什么都不配置"时 curl/git/pip/python
      # 的行为，不是"能不能装上 curl/git/pip"。两个镜像默认源都不需要额外配置。
      # 注意：这里不预装 requests 库——check_all.sh 自己每个 case 都会跑一次
      # `pip install requests`，第一个信任配置生效的 case（Case 01）会把它
      # 真正装上，之后的 case 直接复用。提前用 squid CA 引导装一次纯粹是鸡生蛋：
      # 装它本身就需要一种信任机制，而这正是要测的东西。
      - name: Install prerequisites (ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-pip python3-venv

      # Ubuntu's default mirror is plain http:// (see check_all.sh comment above and
      # actual apt logs — ports.ubuntu.com over http, no TLS involved), so apt itself
      # never needs CA trust here. This step tests, independent of apt, whether the
      # same manual-cat approach used for openEuler's yum bundle also works for the
      # Debian/Ubuntu compiled bundle path (/etc/ssl/certs/ca-certificates.crt) — using
      # curl against the same squid-fronted HTTPS target as the canary check.
      - name: Test apt (ubuntu) - manual cat to ca-certificates.crt
        if: matrix.os == 'ubuntu'
        run: |
          cp /etc/ssl/certs/ca-certificates.crt /tmp/ca-certificates-bootstrap.bak
          cat /etc/squid-ca/squid-ca.pem >> /etc/ssl/certs/ca-certificates.crt
          if curl -fsS --max-time 30 -o /dev/null "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/"; then
            echo "APT_BUNDLE_MANUAL_CAT_TEST=OK (curl trusted squid CA via manual cat)"
          else
            echo "APT_BUNDLE_MANUAL_CAT_TEST=FAIL"
          fi
          # Restore so Case 00 starts from a real blank slate, same as openEuler revert.
          cp /tmp/ca-certificates-bootstrap.bak /etc/ssl/certs/ca-certificates.crt
          rm /tmp/ca-certificates-bootstrap.bak

      # openEuler 的 yum 默认源全部是 HTTPS（mirrors.openeuler.org /
      # repo.openeuler.org），装 git/curl 本身就要先有 CA 信任——跟 ubuntu
      # 侧当初 actions/checkout 遇到的鸡生蛋问题是同一类。用 squid CA 引导
      # 这一步装完之后立刻撤销，保证 Case 00 仍是真正的空白信任状态。
      - name: Install prerequisites (openeuler)
        if: matrix.os == 'openeuler'
        run: |
          # Test: manual cat to compiled bundle instead of update-ca-trust anchor mechanism.
          # Backup first so revert is a clean restore — no need to re-run update-ca-trust.
          cp /etc/pki/tls/certs/ca-bundle.crt /tmp/ca-bundle-bootstrap.bak
          cat /etc/squid-ca/squid-ca.pem >> /etc/pki/tls/certs/ca-bundle.crt
          echo "yum bootstrap method: manual cat >> /etc/pki/tls/certs/ca-bundle.crt"
          yum install -y git curl ca-certificates python3 python3-pip

      - name: Revert openEuler bootstrap trust so Case 00 starts from a real blank slate
        if: matrix.os == 'openeuler'
        run: |
          # Restore from backup — exact inverse of the cat above, no update-ca-trust needed.
          cp /tmp/ca-bundle-bootstrap.bak /etc/pki/tls/certs/ca-bundle.crt
          rm /tmp/ca-bundle-bootstrap.bak

      # ────────────────────────────────────────────────────────────────
      # 每个 case 只设置一种 CA 信任机制（用 GitHub Actions 原生的 step-level
      # `env:`，只在这一个 step 里生效，不会泄漏到别的 case），同一个 case 里
      # 测全部 5 种客户端：curl / git / python3 urllib / pip / 裸 python requests。
      # 期望值直接写在这个 case 步骤旁边，不用跳到别的文件里找。
      # ────────────────────────────────────────────────────────────────

      - name: Case 00 - negative control (no CA trust at all)
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=FAIL"           || { echo "::error::expected CURL=FAIL"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=FAIL"  || { echo "::error::expected PYTHON_URLLIB=FAIL"; exit 1; }
          echo "$out" | grep -qx "PIP=FAIL"            || { echo "::error::expected PIP=FAIL"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

      - name: Case 01 - SSL_CERT_FILE
        env:
          SSL_CERT_FILE: /etc/squid-ca/squid-ca.pem
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          echo "PIP_VERSION(stock)=$(python3 -m pip --version)"
          # curl / python-urllib 走 OpenSSL 默认信任路径 -> 认这个变量 -> OK
          # git 不认 SSL_CERT_FILE，只认 GIT_SSL_CAINFO / 系统信任 -> FAIL
          # pip: 实测记录，不是假设——stock pip 24.0（apt 装的默认版本）默认不读
          # SSL_CERT_FILE。pip>=22.2 有个 truststore 功能可以读系统/OpenSSL 信任
          # 路径，但默认关闭，要显式加 --use-feature=truststore 才生效（见
          # Case 01b）。不加的话 pip 跟裸 requests 一样只认内置 certifi -> FAIL。
          # 这跟我们之前在 squid-openssl 里另一个镜像/另一个 pip 版本上验证的
          # 结论不一样——版本相关，两边都如实记录，不互相覆盖。
          # 裸 requests 只认内置 certifi，不看这个变量 -> FAIL
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=OK"             || { echo "::error::expected CURL=OK"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=OK"    || { echo "::error::expected PYTHON_URLLIB=OK"; exit 1; }
          echo "$out" | grep -qx "PIP=FAIL"            || { echo "::error::expected PIP=FAIL (stock pip, truststore not enabled)"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

      # 独立记录一个版本相关的问题："pip 默认不认 SSL_CERT_FILE"这件事,换一个
      # 更新的 pip 版本是否会不一样？用 get-pip.py 升级（它自带一份 pip wheel,
      # 不需要额外发网络请求,不依赖 pip 自己的信任逻辑),然后用同样的、不加任何
      # 特殊 flag 的命令重新测一次,只记录结果,不预设期望值——这个 case 存在的
      # 目的就是回答这个问题,不是拿它断言一个已经知道的答案。
      - name: Case 01b - SSL_CERT_FILE, does upgrading pip change the default behavior?
        continue-on-error: true   # 探索性实验，bootstrap.pypa.io 偶发 503 不应杀掉后续 case
        env:
          SSL_CERT_FILE: /etc/squid-ca/squid-ca.pem
        run: |
          # 隔离在独立 venv 里做这个实验——上一版直接在系统 Python 上
          # --ignore-installed 升级 pip，污染了全局 site-packages（新 pip
          # 把 requests/urllib3 装到了 /usr/local/lib，覆盖了系统 pip 后面
          # 几个 case 找到的版本），导致 Case 02 复用了这次升级后的状态，
          # 而不是"仍在测 stock pip"。venv 保证这次实验完全不影响后续 case。
          old_version="$(python3 -m pip --version)"
          python3 -m venv /tmp/env-ca-case01b-venv
          . /tmp/env-ca-case01b-venv/bin/activate
          curl -fsS --max-time 180 -o /tmp/get-pip.py https://bootstrap.pypa.io/get-pip.py
          python3 /tmp/get-pip.py --no-cache-dir
          new_version="$(python3 -m pip --version)"
          echo "PIP_VERSION: stock=[$old_version] upgraded(in venv)=[$new_version]"

          out=$(python3 -m pip install --no-cache-dir --force-reinstall --no-deps --index-url "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/" requests 2>&1)
          echo "$out" | tail -8
          if echo "$out" | grep -qE "Collecting|Downloading" && echo "$out" | grep -q "Successfully installed"; then
            echo "PIP_UPGRADED_DEFAULT_BEHAVIOR=OK"
          else
            echo "PIP_UPGRADED_DEFAULT_BEHAVIOR=FAIL"
          fi
          deactivate
          rm -rf /tmp/env-ca-case01b-venv

      - name: Case 02 - SSL_CERT_DIR (prepare hashed capath)
        run: |
          rm -rf /tmp/env-ca-case02-capath
          mkdir -p /tmp/env-ca-case02-capath
          cp /etc/squid-ca/squid-ca.pem /tmp/env-ca-case02-capath/
          openssl rehash /tmp/env-ca-case02-capath

      - name: Case 02 - SSL_CERT_DIR
        env:
          SSL_CERT_DIR: /tmp/env-ca-case02-capath
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # 跟 SSL_CERT_FILE 是同一类机制（OpenSSL 默认路径）。pip 这一项同样
          # 记录 stock pip 24.0 的真实行为:FAIL(见 Case 01 的详细解释和 Case 01b
          # 关于版本相关性的记录,这里不重复跑一遍升级测试)。
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=OK"             || { echo "::error::expected CURL=OK"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=OK"    || { echo "::error::expected PYTHON_URLLIB=OK"; exit 1; }
          echo "$out" | grep -qx "PIP=FAIL"            || { echo "::error::expected PIP=FAIL (stock pip, see Case 01)"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

      - name: Case 03 - CURL_CA_BUNDLE
        env:
          CURL_CA_BUNDLE: /etc/squid-ca/squid-ca.pem
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # 最初以为这是 curl-CLI 专属变量，其他客户端都不认——实测发现不对，
          # 已在 pip/requests 官方源码里核实：requests 库的
          # Session.merge_environment_settings() 显式写了
          # "Look for requests environment configuration and be compatible
          # with cURL"，会在 REQUESTS_CA_BUNDLE 之后把 CURL_CA_BUNDLE 当 fallback
          # 读——不是 pip 自己的逻辑，是 requests 库本身的行为。pip 内部发请求
          # 用的也是 requests，所以 PIP 和裸 REQUESTS 都会认这个变量。
          # git / python3 urllib（走 stdlib ssl，不经过 requests 库）不认。
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=OK"             || { echo "::error::expected CURL=OK"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=FAIL"  || { echo "::error::expected PYTHON_URLLIB=FAIL"; exit 1; }
          echo "$out" | grep -qx "PIP=OK"              || { echo "::error::expected PIP=OK (requests-library CURL_CA_BUNDLE fallback)"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=OK"         || { echo "::error::expected REQUESTS=OK (requests-library CURL_CA_BUNDLE fallback)"; exit 1; }

      - name: Case 04 - GIT_SSL_CAINFO
        env:
          GIT_SSL_CAINFO: /etc/squid-ca/squid-ca.pem
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # git-CLI 专属变量，其他客户端都不认
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=FAIL"           || { echo "::error::expected CURL=FAIL"; exit 1; }
          echo "$out" | grep -qx "GIT=OK"              || { echo "::error::expected GIT=OK"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=FAIL"  || { echo "::error::expected PYTHON_URLLIB=FAIL"; exit 1; }
          echo "$out" | grep -qx "PIP=FAIL"            || { echo "::error::expected PIP=FAIL"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

      - name: Case 05 - REQUESTS_CA_BUNDLE
        env:
          REQUESTS_CA_BUNDLE: /etc/squid-ca/squid-ca.pem
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # requests 库自己读取的变量：pip 内部用 requests 库实现网络请求,所以也认;
          # 裸 requests 调用同样认——这个变量正好补上了裸 requests 的信任盲区
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=FAIL"           || { echo "::error::expected CURL=FAIL"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=FAIL"  || { echo "::error::expected PYTHON_URLLIB=FAIL"; exit 1; }
          echo "$out" | grep -qx "PIP=OK"              || { echo "::error::expected PIP=OK"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=OK"         || { echo "::error::expected REQUESTS=OK"; exit 1; }

      - name: Case 06 - PIP_CERT
        env:
          PIP_CERT: /etc/squid-ca/squid-ca.pem
        run: |
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # pip 专属变量，裸 requests 不认（pip 内部虽然用 requests 库发请求，
          # 但 PIP_CERT 是 pip 自己读取并显式传给它内部 session 的，不是
          # requests 库自己去读环境变量）
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=FAIL"           || { echo "::error::expected CURL=FAIL"; exit 1; }
          echo "$out" | grep -qx "GIT=FAIL"            || { echo "::error::expected GIT=FAIL"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=FAIL"  || { echo "::error::expected PYTHON_URLLIB=FAIL"; exit 1; }
          echo "$out" | grep -qx "PIP=OK"              || { echo "::error::expected PIP=OK"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

      # 必须最后跑：这是唯一一个改系统级信任存储的 case，跑完之后同一个容器里
      # 所有客户端都会永久信任 squid CA，放在前面会污染前面 case 的判定。
      - name: Case 08 - positive control (system-wide CA trust rebuild)
        run: |
          if command -v update-ca-certificates >/dev/null 2>&1; then
            cp /etc/squid-ca/squid-ca.pem /usr/local/share/ca-certificates/squid-ca.crt
            update-ca-certificates
          elif command -v update-ca-trust >/dev/null 2>&1; then
            mkdir -p /etc/pki/ca-trust/source/anchors
            cp /etc/squid-ca/squid-ca.pem /etc/pki/ca-trust/source/anchors/squid-ca.pem
            update-ca-trust extract
          else
            echo "::error::no known system CA trust update command found"
            exit 1
          fi
          out="$(sh /tmp/env-ca-case-007/check_all.sh)"
          echo "$out"
          # 系统级信任覆盖 curl/git/python-urllib/pip；裸 requests 依旧 FAIL——
          # 它只认内置 certifi，系统信任重建救不了它，这是这张表里唯一的盲区
          echo "$out" | grep -qx "CANARY=BUMPED"       || { echo "::error::canary not bumped"; exit 1; }
          echo "$out" | grep -qx "CURL=OK"             || { echo "::error::expected CURL=OK"; exit 1; }
          echo "$out" | grep -qx "GIT=OK"              || { echo "::error::expected GIT=OK"; exit 1; }
          echo "$out" | grep -qx "PYTHON_URLLIB=OK"    || { echo "::error::expected PYTHON_URLLIB=OK"; exit 1; }
          echo "$out" | grep -qx "PIP=OK"              || { echo "::error::expected PIP=OK"; exit 1; }
          echo "$out" | grep -qx "REQUESTS=FAIL"       || { echo "::error::expected REQUESTS=FAIL"; exit 1; }

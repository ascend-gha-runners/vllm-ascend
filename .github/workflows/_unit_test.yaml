name: 'unit test'

on:
  workflow_call:
    secrets:
      HW_OBS_AK:
        required: false
      HW_OBS_SK:
        required: false
    inputs:
      vllm:
        required: true
        type: string
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      type:
        required: true
        type: string
  workflow_dispatch:
jobs:
  unit-test:
    name: unit test
    runs-on: linux-arm64-npu-test-1
    container:
      image: ${{ inputs.image }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        SOC_VERSION: ascend910b1
        MAX_JOBS: 4
        COMPILE_CUSTOM_KERNELS: 0
        # uv
        UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
        UV_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
        UV_INDEX_STRATEGY: unsafe-best-match
        UV_NO_CACHE: 1
        UV_SYSTEM_PYTHON: 1
        UV_PYTHON: python3
        SCCACHE_BUCKET: ascend-ci-cache-hk
        SCCACHE_ENDPOINT: https://obs.ap-southeast-1.myhuaweicloud.com
        SCCACHE_REGION: ap-southeast-1
        SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: true
        AWS_ACCESS_KEY_ID: ${{ secrets.HW_OBS_AK }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.HW_OBS_SK }}
    steps:
      - name: Install packages
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y python3-pip git vim wget net-tools gcc g++ cmake libnuma-dev curl gnupg2
          pip install uv
          [ -n "$AWS_SECRET_ACCESS_KEY" ] && uv pip install sccache
      - name: get hash
        id: get_dir_hash
        run: |
          DIR_HASH=$(find ./csrc ./setup.py ./pyproject.toml ./CMakeLists.txt ./cmake \
            ./vllm_ascend/envs.py ./requirements.txt ./requirements-dev.txt ./packages.txt \
            -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "DIR_HASH=$DIR_HASH" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: runs-on/cache@v4
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: ascend-${{ runner.os }}-vllm-ascend-build-v2-${{ steps.get_dir_hash.outputs.DIR_HASH }}
          restore-keys: |
            ascend-${{ runner.os }}-vllm-ascend-build-v2-${{ steps.get_dir_hash.outputs.DIR_HASH }}
        env:
          # 👇 指定你的 OBS bucket（必须用 virtual-hosted 域名！）
          RUNS_ON_S3_BUCKET_CACHE: obs-guiiyang1-ascend-test
          RUNS_ON_S3_BUCKET_ENDPOINT: https://obs.cn-southwest-2.myhuaweicloud.com
          AWS_ACCESS_KEY_ID: ${{ secrets.HW_OBS_AK }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HW_OBS_SK }}
          AWS_REGION: cn-southwest-2
      - name: Get requirements hash
        id: get_req_hash
        run: |
          REQ_HASH=$(sha256sum requirements.txt requirements-dev.txt 2>/dev/null | sha256sum | awk '{print $1}')
          echo "REQ_HASH=$REQ_HASH" >> $GITHUB_OUTPUT
          echo "requirements hash: $REQ_HASH"
      - name: Cache uv pip packages
        uses: runs-on/cache@v4
        with:
          path: |
            /tmp/uv-cache
            /tmp/pip-cache
          key: ascend-${{ runner.os }}-uv-pip-v2-${{ steps.get_req_hash.outputs.REQ_HASH }}
          restore-keys: |
            ascend-${{ runner.os }}-uv-pip-v2-${{ steps.get_req_hash.outputs.REQ_HASH }}
        env:
          RUNS_ON_S3_BUCKET_CACHE: obs-guiiyang1-ascend-test
          RUNS_ON_S3_BUCKET_ENDPOINT: https://obs.cn-southwest-2.myhuaweicloud.com
          AWS_ACCESS_KEY_ID: ${{ secrets.HW_OBS_AK }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HW_OBS_SK }}
          AWS_REGION: cn-southwest-2
      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ inputs.vllm }}
          path: ./vllm-empty

      - name: Install vllm-project/vllm from source
        working-directory: ./vllm-empty
        run: |
          VLLM_TARGET_DEVICE=empty uv pip install . --extra-index-url https://download.pytorch.org/whl/cpu/
          uv pip uninstall triton

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v6
      - name: Check build cache
        id: check-cache
        run: |
          # Cache hit: _cann_ops_custom/ contains real files (not just .gitkeep)
          # and at least one .so extension exists in vllm_ascend/
          if find vllm_ascend/_cann_ops_custom -not -name '.gitkeep' -type f 2>/dev/null | grep -q . \
            && find vllm_ascend -maxdepth 1 -name '*.so' -type f 2>/dev/null | grep -q .; then
            echo "cache_hit=true" >> $GITHUB_OUTPUT
            echo "Found cached build artifacts, will skip compilation"
          else
            echo "cache_hit=false" >> $GITHUB_OUTPUT
            echo "No cached artifacts found, will compile from source"
          fi
      - name: Install vllm-project/vllm-ascend
        run: |
          pip install uc-manager
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/x86_64-linux/devlib
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu/
          if [ "${{ steps.check-cache.outputs.cache_hit }}" = "true" ]; then
            echo "Cache hit: skipping compilation (aclnn + cmake), installing Python package only"
            COMPILE_CUSTOM_KERNELS=0 VLLM_ASCEND_SKIP_ACLNN=1 uv pip install -v . --extra-index-url https://download.pytorch.org/whl/cpu/
            sleep 600
          else
            echo "No cache: building from source"
            uv pip install -v . --extra-index-url https://download.pytorch.org/whl/cpu/
          fi
      - name: Run unit test
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          TORCH_DEVICE_BACKEND_AUTOLOAD: 0
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/x86_64-linux/devlib
          pytest -sv --cov --cov-report=xml:unittests-coverage.xml tests/ut \
            --ignore tests/ut/model_loader/netloader/test_netloader_elastic.py \
            --ignore tests/ut/kv_connector/test_remote_prefill_lifecycle.py \
            --ignore tests/ut/kv_connector/test_remote_decode_lifecycle.py \
            --ignore tests/ut/core/test_scheduler_dynamic_batch.py \
            --ignore tests/ut/kv_connector/test_mooncake_connector.py \
            --ignore tests/ut/worker/test_worker_v1.py \
            --ignore tests/ut/spec_decode/test_mtp_proposer.py

      - name: Upload coverage to Codecov
        # only upload coverage when commits merged
        if: ${{ inputs.type == 'schedule' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          flags: unittests
          name: vllm-ascend
          verbose: true
